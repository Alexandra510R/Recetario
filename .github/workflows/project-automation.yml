name: Project Automation

on:
  issues:
    types: [opened, assigned]
  pull_request:
    types: [opened, closed, merged]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Issue abierto
        if: github.event_name == 'issues' && github.event.action == 'opened'
        run: |
          echo "📋 Nuevo issue creado: ${{ github.event.issue.title }}"
          echo "Mover a In Progress cuando sea asignado"

      - name: Issue asignado
        if: github.event_name == 'issues' && github.event.action == 'assigned'
        run: |
          echo "🔧 Issue asignado a: ${{ github.event.assignee.login }}"
          echo "Card debe moverse a In Progress"

      - name: PR abierto
        if: github.event_name == 'pull_request' && github.event.action == 'opened'
        run: |
          echo "👀 PR abierto: ${{ github.event.pull_request.title }}"
          echo "Card debe moverse a In Review"

      - name: PR mergeado
        if: github.event.pull_request.merged == true
        run: |
          echo "🚀 PR mergeado exitosamente"
          echo "Card debe moverse a Done"